spring.application.name=order-service

server.port=8090
server.address=127.0.0.1
spring.datasource.url=jdbc:mysql://mysql-order:3306/order_db
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

logging.level.com.zaxxer.hikari=DEBUG
spring.main.allow-bean-definition-overriding=true
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3
# ===================== EUREKA =====================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
spring.cloud.client.hostname=localhost
spring.cloud.client.ip-address=127.0.0.1
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# ===================== KAFKA =====================
spring.kafka.bootstrap-servers=kafka:9092

# Consumer configuration
spring.kafka.consumer.group-id=order-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.demo.dto.OrderEvent

# Producer configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Admin (auto topic creation)
spring.kafka.admin.auto-create=true

# Custom topics
app.kafka.topic.order-created=order-created
spring.kafka.topic.orders=order-created