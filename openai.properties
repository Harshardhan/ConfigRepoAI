spring.application.name=openai

server.port=8102
spring.profiles.active=rag
# -----------------------------
# Ollama
# -----------------------------
spring.ai.ollama.base-url=http://ollama:11434

spring.ai.ollama.chat.options.model=phi3
spring.ai.ollama.chat.options.temperature=0.5
spring.ai.ollama.embedding.options.model=nomic-embed-text
# -----------------------------
# PostgreSQL
# -----------------------------
spring.datasource.url=jdbc:postgresql://psql-openai:5432/vectordb
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------
# PGVector
# -----------------------------
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=hnsw
spring.ai.vectorstore.pgvector.distance-type=cosine_distance
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.enabled=true
# -----------------------------
# Tomcat
# -----------------------------
server.tomcat.connection-timeout=120s
# -----------------------------
# Eureka
# -----------------------------
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# -----------------------------
# Logging
# -----------------------------
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.ai.vectorstore=INFO
logging.level.org.springframework.jdbc=INFO
logging.level.org.springframework.web=INFO