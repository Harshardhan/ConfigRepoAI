# ===============================
# SPRING APPLICATION
# ===============================
spring.application.name=otp-service


# ===============================
# SERVER CONFIG
# ===============================
server.port=8096

#Eureka client configuration for service discovery
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
# Database Configuration
spring.datasource.url=jdbc:mysql://mysql-otp:3306/otp_db
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false


#Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=harshavardhan.harish@gmail.com
spring.mail.password=boaj tmcc aupy ssvc

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.mail.properties.mail.debug=true

# ===============================
# REDIS CONFIG
# ===============================
spring.cache.type = redis
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# If Redis has password (optional)
spring.data.redis.password=master

# Connection Pool (recommended)
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=1000ms

# ===============================
# LOGGING CONFIG
# ===============================
logging.level.root=INFO
logging.level.com.example.demo=DEBUG

# ===============================
# RESILIENCE4J (OPTIONAL)
# ===============================
resilience4j.circuitbreaker.instances.otp-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.otp-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.otp-service.failure-rate-threshold=50
resilience4j.retry.instances.otp-service.max-attempts=3
resilience4j.retry.instances.otp-service.wait-duration=500ms

# ===============================
 KAFKA CONFIG 
# ===============================

spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.admin.auto-create=true


# VALIDATION (OPTIONAL)
# ===============================
spring.mvc.throw-exception-if-no-handler-found=true

# ===============================
# ACTUATOR (OPTIONAL - MONITORING)
# ===============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always